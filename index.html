<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#274f3c">
<title>GABFX — O Pregão · Ato 0</title>
<meta http-equiv="Cache-Control" content="no-cache">
<script>
/* AUTO-ATUALIZADOR: detecta versão nova (v.txt) e recarrega sozinho — mata o cache teimoso do iOS */
window.__BUILD='b5';
(function(){try{fetch('v.txt?t='+Date.now(),{cache:'no-store'}).then(function(r){return r.ok?r.text():'';}).then(function(t){t=(t||'').trim();if(t&&t!==window.__BUILD&&location.search.indexOf('v=')<0){location.replace(location.pathname+'?v='+encodeURIComponent(t));}}).catch(function(){});}catch(e){}})();
</script>
<style>
/* ============================================================
   GABFX — Ato 0 (Módulos 1–6): leitura crua do zero.
   Single-file, JS vanilla, <canvas>, mobile-first (retrato), feltro Balatro.
   Fonte da verdade: Metodo_GABFX_COMPLETO.md + ESTRUTURA_JOGO.md.
   [LICENÇA DE DESIGN] = número/regra inventada pro jogo (não é o que o GAB ensina).
   [GAB] = fiel ao método.
   ============================================================ */
:root{
  --felt:#35684e; --felt2:#244a38; --felt3:#1c3a2c;
  --panel:#33372e; --panel2:#42463c; --panelHi:#4d5247;
  --ink:#1b1e17; --cream:#fbf2dd; --line:#14160f;
  --blue:#3ea0e0; --blue2:#1c6fb0; --red:#fe5f55; --red2:#b8312a;
  --gold:#f4c95d; --gold2:#c79320; --green:#37d07a; --green2:#1d8a4e;
  --purple:#a06bd6; --purpleD:#6f3fa3; --chip:#2f9be0; --mult:#fe5f55;
  --txt:#eef3ec; --mut:#9fb3a6; --warn:#e8b53d;
  --safe-top:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;font-family:'Trebuchet MS',Verdana,system-ui,sans-serif;overscroll-behavior:none}
body{
  background:radial-gradient(135% 100% at 50% 0%,#3f7a5b 0%,var(--felt) 38%,var(--felt2) 78%,var(--felt3) 100%);
  color:var(--txt);overflow:hidden;position:fixed;inset:0;touch-action:manipulation}
/* feltro vivo */
body::before{content:"";position:fixed;inset:-15%;z-index:0;opacity:.45;mix-blend-mode:soft-light;pointer-events:none;
  background:radial-gradient(38% 28% at 18% 26%,rgba(255,255,255,.10),transparent 60%),
            radial-gradient(48% 38% at 82% 72%,rgba(0,0,0,.20),transparent 60%),
            radial-gradient(32% 24% at 62% 16%,rgba(255,255,255,.07),transparent 60%);
  animation:drift 16s ease-in-out infinite alternate}
@keyframes drift{from{transform:translate3d(-2%,-1%,0) scale(1.03)}to{transform:translate3d(2%,2%,0) scale(1.07)}}

#shake{position:relative;z-index:1;height:100%;display:flex;flex-direction:column}

/* ---------- HUD topo ---------- */
.hud{display:flex;gap:7px;align-items:center;padding:calc(7px + var(--safe-top)) 11px 7px;flex-shrink:0}
.hud .logo{font-weight:800;font-size:16px;letter-spacing:.4px}
.hud .logo span{color:var(--gold)}
.hud .logo small{display:block;font-size:9px;color:var(--mut);font-weight:600;letter-spacing:2px;margin-top:-2px}
.hud .sp{flex:1}
.pill{font-size:11px;color:var(--mut);background:var(--panel);border:2px solid var(--line);border-radius:9px;padding:3px 8px;box-shadow:0 2px 0 var(--line);display:flex;align-items:center;gap:4px}
.pill b{color:var(--txt);font-size:13px}
.iconbtn{background:var(--panel2);border:2px solid var(--line);border-radius:9px;cursor:pointer;font-size:15px;padding:4px 9px;color:var(--txt);box-shadow:0 2px 0 var(--line)}
.iconbtn:active{transform:translateY(2px);box-shadow:0 0 0 var(--line)}

/* ---------- contêiner de telas ---------- */
#screen{flex:1;min-height:0;position:relative;overflow:hidden}
.view{position:absolute;inset:0;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;padding:0 10px 14px;-webkit-overflow-scrolling:touch}

/* ---------- onboarding / painéis de aula ---------- */
.card-lesson{background:var(--panel);border:2px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 4px 0 var(--line);margin:14px auto 0;max-width:520px;width:100%}
.lesson-head{display:flex;gap:13px;align-items:center}
.lesson-head .tag{color:var(--mut);font-size:11px;letter-spacing:1px;text-transform:uppercase}
.lesson-head h2{margin:1px 0 0;font-size:21px;line-height:1.1}
.lesson-body{color:#dde7df;line-height:1.55;font-size:14.5px;margin-top:12px}
.lesson-body b{color:#fff}
.kw{color:var(--gold);font-weight:800;cursor:pointer;border-bottom:1px dotted var(--gold)}
.up{color:var(--green);font-weight:800}.down{color:var(--red);font-weight:800}
.gab-note{display:flex;gap:8px;background:rgba(160,107,214,.13);border:1px solid rgba(160,107,214,.5);border-radius:11px;padding:9px 11px;font-size:12.5px;color:#e9def8;margin-top:12px;line-height:1.45}
.gab-note .ava{font-size:18px;flex-shrink:0}
.alert{display:flex;gap:8px;background:rgba(232,181,61,.10);border:1px solid rgba(232,181,61,.6);border-radius:11px;padding:9px 11px;font-size:12.5px;color:#ffe6a0;margin-top:10px;line-height:1.45}
.license{display:flex;gap:8px;background:rgba(62,160,224,.08);border:1px dashed rgba(62,160,224,.5);border-radius:10px;padding:7px 10px;font-size:11.5px;color:#bfe0f5;margin-top:8px;line-height:1.4}

.btn{border:2px solid var(--line);border-radius:12px;font-weight:800;font-size:15.5px;padding:13px;cursor:pointer;box-shadow:0 4px 0 var(--line);color:#fff;width:100%;margin-top:13px;font-family:inherit}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--line)}
.btn:disabled{opacity:.45}
.btn.primary{background:var(--blue);box-shadow:0 4px 0 var(--blue2)}
.btn.primary:active{box-shadow:0 1px 0 var(--blue2)}
.btn.go{background:var(--green);color:#06311a;box-shadow:0 4px 0 var(--green2)}
.btn.go:active{box-shadow:0 1px 0 var(--green2)}
.btn.ghost{background:var(--panel2)}
.btn.sm{padding:9px 14px;width:auto;font-size:13.5px;margin:0}

.dots{display:flex;gap:6px;justify-content:center;margin-top:14px}
.dot{width:8px;height:8px;border-radius:50%;background:#ffffff30}
.dot.on{background:var(--gold);width:18px;border-radius:5px}

/* ---------- A MESA ---------- */
.mesa{display:flex;flex-direction:column;gap:7px;max-width:560px;width:100%;margin:0 auto}
.blind{display:flex;gap:10px;align-items:center;background:linear-gradient(180deg,#5e3c3c,#4a2f2f);border:2px solid var(--line);border-radius:13px;padding:8px 11px;box-shadow:0 3px 0 var(--line);margin-top:8px}
.blind .seal{width:54px;height:54px;border-radius:50%;background:radial-gradient(circle at 36% 30%,#e88,#7c2b2b);border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0;overflow:hidden;animation:bob 3s ease-in-out infinite}
.blind .seal svg{width:100%;height:100%;display:block;border-radius:50%}
@keyframes bob{50%{transform:translateY(-3px)}}
.blind .bt b{font-size:14px}.blind .bt small{display:block;color:#ffd9d9;font-size:10.5px;line-height:1.25}
.blind .goal{margin-left:auto;text-align:center;flex-shrink:0}
.blind .goal .n{color:var(--gold);font-size:19px;font-weight:800;text-shadow:0 2px 0 #0006;white-space:nowrap}
.blind .goal small{color:#ffeaea;font-size:9.5px;display:block}

.statline{display:flex;gap:6px}
.statline .b{flex:1;background:var(--panel);border:2px solid var(--line);border-radius:10px;padding:5px 4px;text-align:center;box-shadow:0 2px 0 var(--line)}
.statline small{display:block;color:var(--mut);font-size:9.5px;letter-spacing:.5px}
.statline b{font-size:15px}
.statline .pips b{color:var(--gold)}

/* fórmula CHIPS × MULT */
.formula{display:flex;align-items:stretch;margin:1px 0;overflow:hidden}
.chips,.mult{font-size:21px;font-weight:800;padding:6px 0;border:2px solid var(--line);box-shadow:0 3px 0 var(--line);flex:1;min-width:0;text-align:center;transition:transform .12s}
.chips{background:linear-gradient(180deg,var(--chip),var(--blue2));border-radius:11px 0 0 11px;color:#fff}
.mult{background:linear-gradient(180deg,var(--mult),var(--red2));border-radius:0 11px 11px 0;color:#fff}
.fx{font-size:18px;font-weight:800;padding:0 8px;display:flex;align-items:center;color:var(--txt)}
.bump{transform:scale(1.16)}

/* gráfico ao vivo */
.felt{background:rgba(0,0,0,.22);border:2px solid var(--line);border-radius:12px;padding:7px;box-shadow:inset 0 2px 16px #0007;position:relative}
canvas{width:100%;background:linear-gradient(180deg,#08111a,#060c12);border-radius:8px;border:1px solid var(--line);display:block;touch-action:none}
.tf-badge{position:absolute;top:13px;right:14px;background:#0008;border:1px solid #ffffff22;border-radius:7px;font-size:10px;color:#bfe0cf;padding:2px 7px;letter-spacing:1px}

/* mentor */
.say{display:flex;gap:9px;align-items:flex-start;background:rgba(160,107,214,.13);border:1px solid rgba(160,107,214,.45);border-radius:11px;padding:9px 11px;font-size:13px;color:#ece4ff;line-height:1.4;min-height:42px}
.say .ava{font-size:21px;flex-shrink:0}
.say b{color:#fff}

/* fila de coringas */
.lane-label{font-size:9.5px;color:var(--mut);text-transform:uppercase;letter-spacing:1.5px;margin:3px 0 -1px 5px;display:flex;justify-content:space-between;align-items:center}
.lane-label .cnt{color:#cfe6da;letter-spacing:0}
.jokers{display:flex;gap:7px;justify-content:center;align-items:center;min-height:74px;flex-wrap:wrap}
.joker-empty{width:62px;height:84px;border:2px dashed #ffffff22;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#ffffff22;font-size:24px}

/* mão */
.hand{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;min-height:138px;align-items:flex-end;padding-top:14px}

.actions{display:flex;gap:7px;margin-top:5px}
.actions .btn{margin:0}
.btn.op{background:var(--green);color:#06311a;box-shadow:0 4px 0 var(--green2)}
.btn.op:active{box-shadow:0 1px 0 var(--green2)}
.btn.disc{background:var(--panel2);max-width:42%}

.note{text-align:center;color:var(--mut);font-size:10px;margin-top:11px;line-height:1.5;max-width:480px;margin-left:auto;margin-right:auto;padding-bottom:6px}
.note b{color:var(--warn)}

/* ============ CARTAS ============ */
.card{position:relative;border-radius:12px;cursor:pointer;flex-shrink:0;transform-style:preserve-3d;
  transition:transform .2s cubic-bezier(.2,1.3,.4,1),opacity .25s;will-change:transform}
.card.hcard{width:92px}
.card.joker{width:74px}
.card .inner{border-radius:12px;overflow:hidden;border:2px solid var(--line);background:linear-gradient(180deg,#fffaf0,var(--cream));box-shadow:0 6px 12px #0007;position:relative}
.card .top{display:flex;justify-content:space-between;align-items:center;padding:3px 6px;background:var(--ink);color:#fff;gap:4px}
.card .nm{font-size:10.5px;font-weight:800;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .rr{font-size:6.5px;padding:1px 4px;border-radius:10px;font-weight:800;flex-shrink:0;letter-spacing:.3px}
.rr.comum{background:#9aa6a0;color:#1c1f18}
.rr.incomum{background:var(--blue);color:#fff}
.rr.coringa{background:var(--purple);color:#fff}
.rr.risco{background:#caa23a;color:#1c1f18}
.rr.lendaria{background:linear-gradient(90deg,#ff5cf0,#5ce0ff,#ffe45c);color:#1c1f18}
/* selos de raridade ANIMADOS — brilho/pulso (incomum/risco) + varredura (coringa/lendária) */
@keyframes rrGlow{0%,100%{box-shadow:0 0 0 0 rgba(0,0,0,0)}50%{box-shadow:0 0 8px 1px var(--rrg)}}
@keyframes rrShine{0%,55%{transform:translateX(-130%)}100%{transform:translateX(130%)}}
.rr.incomum{--rrg:#3ea0e0cc;animation:rrGlow 2.4s ease-in-out infinite}
.rr.risco{--rrg:#e0a93acc;animation:rrGlow 1.7s ease-in-out infinite}
.rr.coringa{--rrg:#a06bd6dd;animation:rrGlow 2.1s ease-in-out infinite;position:relative;overflow:hidden}
.rr.lendaria{position:relative;overflow:hidden}
.rr.coringa::after,.rr.lendaria::after{content:"";position:absolute;inset:0;background:linear-gradient(110deg,transparent 35%,rgba(255,255,255,.7) 50%,transparent 65%);transform:translateX(-130%);animation:rrShine 2.6s ease-in-out infinite;pointer-events:none}
@media(prefers-reduced-motion:reduce){.rr{animation:none!important}.rr::after{animation:none!important;display:none}}
.card .art{height:50px;display:block;width:100%;background:#0b1320}
.card.joker .art{height:42px}
.card .desc{padding:4px 6px 5px;color:var(--ink);min-height:38px}
.card .desc .v{font-size:13px;font-weight:800;display:block}
.card .desc .vc{color:#155a96}.card .desc .vm{color:#a01c1c}.card .desc .vz{color:#155a96}
.card .desc small{display:block;color:#5f5743;font-size:8.8px;line-height:1.18;margin-top:1px}
.card .fam{position:absolute;top:3px;left:6px;font-size:7px;color:#ffffff66;letter-spacing:1px;text-transform:uppercase;z-index:3}

/* foil que segue o dedo */
.shine{position:absolute;inset:0;border-radius:12px;pointer-events:none;
  background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(255,255,255,.55),transparent 44%);
  mix-blend-mode:overlay;opacity:0;transition:opacity .2s}
.card:active .shine,.card.lifted .shine{opacity:1}
/* holográfico das raras/coringas */
/* foil holográfico SÓ NA BORDA: anel conic mascarado (border-box xor padding-box) */
.holo{
  position:absolute; inset:0;           /* mesma caixa do miolo → cantos batem (sem vazamento) */
  border-radius:13px;                   /* = raio do .inner */
  pointer-events:none; opacity:0; z-index:1;
  padding:3.5px;                        /* espessura do anel (substitui border: evita o leak de canto) */
  background:conic-gradient(from 0deg,
      #ff4dd8,#54e0ff,#fff27a,#5cff9e,#7aa8ff,#b15bff,#ff4dd8);
  -webkit-mask:
      linear-gradient(#000 0 0) content-box,
      linear-gradient(#000 0 0);
          mask:
      linear-gradient(#000 0 0) content-box,
      linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;           /* Safari / iOS PWA */
          mask-composite:exclude;       /* spec */
  transition:opacity .2s ease;
}
/* ANIMAÇÃO que REPINTA de verdade: hue-rotate cicla as cores do anel.
   (animar o ÂNGULO do conic via @property NÃO repinta sob mask no Chrome → parecia estático.
    o filtro hue-rotate é aplicado pós-render, então força repaint mesmo com mask.) */
@keyframes holoCycle{
  0%  {filter:hue-rotate(0deg)   saturate(1.4) brightness(1.08) drop-shadow(0 0 5px #ffffff44)}
  100%{filter:hue-rotate(360deg) saturate(1.4) brightness(1.08) drop-shadow(0 0 5px #ffffff44)}
}
.card.foil .holo{opacity:.85; animation:holoCycle 3.5s linear infinite}
.card.foil.lifted .holo,
.card.foil:active .holo{opacity:1; animation-duration:1.5s}
@media(prefers-reduced-motion:reduce){.card.foil .holo{animation:none;filter:saturate(1.3) brightness(1.06)}}
/* BRILHO rápido varrendo a carta INTEIRA (glare branco, além do anel) */
.card.foil .inner::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:2;
  background:linear-gradient(115deg,transparent 42%,rgba(255,255,255,.55) 50%,transparent 58%);
  transform:translateX(-135%);animation:cardShine 5s ease-in-out infinite}
@keyframes cardShine{0%,80%{transform:translateX(-135%)}100%{transform:translateX(135%)}}
@media(prefers-reduced-motion:reduce){.card.foil .inner::after{display:none}}
/* moldura por raridade */
.card.incomum .inner{box-shadow:0 0 0 1px var(--blue) inset,0 6px 12px #0007}
.card.coringa .inner{box-shadow:0 0 0 1px var(--purple) inset,0 0 11px #a06bd680,0 6px 12px #0007}
.card.risco .inner{box-shadow:0 0 0 1px #caa23a inset,0 0 11px #caa23a88,0 6px 12px #0007}
.card.lendaria .inner{box-shadow:0 0 0 1px #ffd86b inset,0 0 16px #ffd86b99,0 6px 12px #0007}
/* ===== CORINGAS (JOKERS): CADA UM com efeito ÚNICO (estilo Balatro — você reconhece pela cara) =====
   Comum a todos: anel arco-íris (= "é coringa"). Assinatura própria: cor da aura + ritmo + cor das faíscas. */
.card.coringa .holo{animation-duration:2.2s;opacity:.96}
@keyframes jokerSparkle{0%,100%{opacity:.15;transform:scale(.96)}50%{opacity:1;transform:scale(1)}}
.card.coringa .inner::before{content:"";position:absolute;inset:0;pointer-events:none;z-index:3;border-radius:11px;
  filter:drop-shadow(0 0 2px #ffffffcc);animation:jokerSparkle 2.6s ease-in-out infinite}
/* fallback (coringa sem assinatura): roxo/ouro */
@keyframes jokerAura{0%,100%{box-shadow:0 0 0 1px #a06bd6 inset,0 0 12px #a06bd680,0 6px 12px #0007}50%{box-shadow:0 0 0 1.5px #ffd86b inset,0 0 22px #a06bd6cc,0 0 28px #ffd86b66,0 6px 12px #0007}}
.card.coringa .inner{animation:jokerAura 2.6s ease-in-out infinite}
.card.coringa .inner::before{background:radial-gradient(circle 2.3px at 18% 26%,#fff,transparent 70%),radial-gradient(circle 2px at 78% 20%,#ffe89a,transparent 70%),radial-gradient(circle 2.2px at 84% 64%,#fff,transparent 70%),radial-gradient(circle 1.9px at 34% 74%,#e7c6ff,transparent 70%),radial-gradient(circle 2.1px at 58% 46%,#fff,transparent 70%)}
/* ◆ Candle-Close — VERDE, calmo (paciência/fechamento) */
@keyframes auraClose{0%,100%{box-shadow:0 0 14px 2px #37d07a99,0 0 0 1px #2a8d5a inset,0 6px 12px #0007}50%{box-shadow:0 0 30px 7px #37d07a,0 0 0 2px #9af3bf inset,0 6px 12px #0007}}
.card.k-close .inner{animation:auraClose 3.4s ease-in-out infinite}
.card.k-close .inner::before{background:radial-gradient(circle 2.3px at 20% 28%,#dfffe9,transparent 70%),radial-gradient(circle 2px at 76% 18%,#7be0a6,transparent 70%),radial-gradient(circle 2.2px at 84% 62%,#fff,transparent 70%),radial-gradient(circle 1.9px at 32% 74%,#37d07a,transparent 70%),radial-gradient(circle 2.1px at 56% 46%,#dfffe9,transparent 70%);animation-duration:3s}
/* ◆ Roadblock — VERMELHO, alvo (pulso de mira, mais rápido) */
@keyframes auraRoad{0%,100%{box-shadow:0 0 14px 2px #fe5f5599,0 0 0 1px #9c2f29 inset,0 6px 12px #0007}50%{box-shadow:0 0 30px 7px #fe5f55,0 0 0 2px #ffb4ac inset,0 6px 12px #0007}}
.card.k-road .inner{animation:auraRoad 1.7s ease-in-out infinite}
.card.k-road .inner::before{background:radial-gradient(circle 2.3px at 18% 24%,#ffd9d4,transparent 70%),radial-gradient(circle 2px at 78% 20%,#ffd86b,transparent 70%),radial-gradient(circle 2.2px at 84% 64%,#fff,transparent 70%),radial-gradient(circle 1.9px at 34% 74%,#fe5f55,transparent 70%),radial-gradient(circle 2.1px at 58% 46%,#ffd9d4,transparent 70%);animation-duration:1.9s}
@media(prefers-reduced-motion:reduce){.card.coringa .inner{animation:none}.card.coringa .inner::before{display:none}}
.card.sel{transform:translateY(-15px) scale(1.03)!important}
.card.sel .inner{box-shadow:0 0 0 3px var(--gold),0 0 18px var(--gold)80,0 8px 14px #0007}
.card.trap-revealed .inner{box-shadow:0 0 0 3px var(--red),0 0 16px var(--red)!important}
.card .warn{position:absolute;top:-7px;right:-7px;background:#caa23a;color:#1c1f18;font-size:11px;border-radius:50%;width:21px;height:21px;display:flex;align-items:center;justify-content:center;border:2px solid var(--line);z-index:4}
.card .infodot{position:absolute;bottom:3px;right:5px;font-size:10px;color:#9b8f6e;z-index:3}
/* ===== cartas MAIORES (base mobile-first; sobrepõe os tamanhos acima) ===== */
.card.hcard{width:112px}
.card.joker{width:100px}
.card .inner{border-radius:13px}
.card,.shine{border-radius:13px}
.card .top{padding:4px 7px}
.card .nm{font-size:12px}
.card .rr{font-size:6.5px;padding:1px 4px;max-width:46%}
.card .art{height:60px}
.card.joker .art{height:50px}
.card .desc{padding:5px 7px 6px;min-height:43px}
.card .desc .v{font-size:14.5px}
.card .desc small{font-size:9.5px;line-height:1.2}
.card .fam{display:none}   /* rótulo de família escondido: poluía/sobrepunha o nome no celular */
.card .infodot{font-size:11px}
.hand{min-height:160px;gap:7px;padding-top:15px}
.jokers{min-height:90px;gap:8px}
.joker-empty{width:76px;height:102px;font-size:27px;border-radius:13px}

/* flutuante de pontuação */
.pop{position:fixed;z-index:60;font-weight:800;font-size:22px;text-shadow:0 2px 5px #000a,0 0 2px #000;pointer-events:none;animation:fly 1.05s cubic-bezier(.2,.7,.3,1) forwards;white-space:nowrap}
@keyframes fly{0%{opacity:0;transform:translateY(4px) scale(.6)}14%{opacity:1;transform:translateY(-6px) scale(1.12)}100%{opacity:0;transform:translateY(-82px) scale(1.05)}}
.spark{position:fixed;z-index:59;pointer-events:none;border-radius:50%;animation:sp .6s ease-out forwards}
@keyframes sp{0%{opacity:1;transform:scale(.4)}100%{opacity:0;transform:scale(1.8)}}

@keyframes sh{10%,90%{transform:translate(-1px,0)}30%,70%{transform:translate(2px,-2px)}50%{transform:translate(-2px,2px)}}
.shaking{animation:sh .3s}
.shaking.hard{animation:sh .42s}

/* overlay genérico (resultado, painel da carta, dicionário) */
.over{position:fixed;inset:0;z-index:80;display:none;align-items:flex-start;justify-content:center;background:rgba(3,6,11,.84);padding:16px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.over.show{display:flex}
.sheet{background:var(--panel);border:3px solid var(--line);border-radius:18px;padding:0;box-shadow:0 10px 0 var(--line);max-width:460px;width:100%;margin:auto;overflow:hidden}
.sheet-head{display:flex;align-items:center;gap:10px;padding:13px 15px;background:var(--panel2);border-bottom:2px solid var(--line)}
.sheet-head h3{margin:0;font-size:17px;flex:1}
.sheet-head .x{background:var(--panel);border:2px solid var(--line);border-radius:9px;color:#fff;font-size:15px;width:34px;height:34px;cursor:pointer;box-shadow:0 2px 0 var(--line);flex-shrink:0}
.sheet-body{padding:15px}

/* painel da carta (eu não sei nada) */
.detail-card{display:flex;gap:12px;align-items:flex-start;margin-bottom:6px}
.detail-card .mini{width:88px;flex-shrink:0}
.detail-card .meta .nm{font-size:18px;font-weight:800}
.detail-card .meta .rrtag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:800;display:inline-block;margin-top:4px}
.sect{margin-top:13px}
.sect h4{margin:0 0 3px;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:6px}
.sect p{margin:0;font-size:13.5px;line-height:1.5;color:#dde7df}
.sect.game h4{color:var(--blue)}
.sect.method h4{color:var(--green)}
.sect.example h4{color:var(--purple)}
.sect.example p{background:#00000028;border-left:3px solid var(--purple);border-radius:6px;padding:7px 10px;font-style:italic}
.chipline{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap}
.chipline .ck{font-size:12px;font-weight:800;padding:4px 9px;border-radius:8px;border:2px solid var(--line);box-shadow:0 2px 0 var(--line)}
.ck.c{background:var(--chip)}.ck.m{background:var(--mult)}.ck.z{background:var(--green);color:#06311a}.ck.t{background:#caa23a;color:#1c1f18}

/* dicionário */
.dic-row{padding:9px 2px;border-bottom:1px solid #ffffff14}
.dic-row b{color:var(--blue);font-size:14px}
.dic-row p{margin:2px 0 0;color:#cdd9cf;font-size:12.5px;line-height:1.45}

/* tooltip-conceito (ao disparar carta) */
.concept-toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(40px);z-index:70;
  background:var(--panel);border:2px solid var(--gold);border-radius:13px;padding:10px 14px;max-width:330px;width:calc(100% - 32px);
  box-shadow:0 6px 18px #000a;opacity:0;transition:transform .35s cubic-bezier(.2,1.3,.4,1),opacity .35s;pointer-events:none}
.concept-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.concept-toast .ct-head{display:flex;align-items:center;gap:7px;font-weight:800;font-size:13px;color:var(--gold)}
.concept-toast .ct-body{font-size:12.5px;color:#dde7df;line-height:1.4;margin-top:3px}

/* resultado */
.result-icon{font-size:46px;text-align:center;line-height:1}
.result h2{text-align:center;margin:8px 0 4px;font-size:25px}
.result .pipbig{text-align:center;font-size:38px;font-weight:800;color:var(--gold);text-shadow:0 3px 0 #0006}
.result p{font-size:14px;line-height:1.5;color:#dde7df;text-align:center}
.result .why{background:#00000026;border-left:3px solid var(--green);border-radius:8px;padding:10px 12px;text-align:left;margin-top:12px;font-size:13.5px;line-height:1.5}
.result .why.bad{border-color:var(--red)}
.unlock{display:flex;gap:9px;align-items:center;background:rgba(244,201,93,.12);border:1px solid rgba(244,201,93,.55);border-radius:11px;padding:9px 11px;margin-top:12px;font-size:13px;color:#ffe6a0}

/* selo de fidelidade no rodapé do painel */
.fid{font-size:10.5px;color:var(--mut);margin-top:12px;text-align:center;line-height:1.4}
.fid .gabtag{color:var(--green);font-weight:800}
.fid .lictag{color:var(--blue);font-weight:800}

@media(min-height:760px){
  .hand{min-height:176px}
  .card.hcard{width:112px}
  .card .art{height:66px}
  .card.joker .art{height:54px}
}
@media(max-width:340px){
  .card.hcard{width:100px}
  .card.joker{width:86px}
  .card .art{height:52px}
  .card.joker .art{height:44px}
  .card .desc .v{font-size:13.5px}
  .hand{min-height:146px}
  .jokers{min-height:82px}
  .joker-empty{width:66px;height:90px}
}
/* ===== nomes sem cortar (até 2 linhas) + altura UNIFORME das cartas da mão ===== */
.card .nm{white-space:normal;overflow:hidden;text-overflow:clip;line-height:1.08;overflow-wrap:anywhere;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.card .top{min-height:30px}
.hand{align-items:stretch}
.hand .card{display:flex;flex-direction:column}
.hand .card .inner{flex:1;display:flex;flex-direction:column}
.hand .card .desc{flex:1}
/* coringas são mais estreitos: nome/selo menores p/ não cortar "Roadblock (TP)" */
.card.joker .nm{font-size:9.5px;line-height:1.05;overflow-wrap:anywhere}
.card.joker .rr{font-size:6.5px;padding:1px 4px}

/* ===== ESCALA DESKTOP (só telas largas → mobile-first <820px intacto) ===== */
@media(min-width:820px){
  .view{padding:0 24px 26px}
  .card-lesson{max-width:900px;padding:38px 48px;border-radius:22px;margin-top:34px}
  .lesson-head{gap:22px}
  .lesson-head .tag{font-size:13.5px}
  .lesson-head h2{font-size:34px;line-height:1.12}
  .lesson-head>div:first-child{width:132px!important}
  .lesson-head .card.hcard{width:132px!important}
  .lesson-body{font-size:20px;line-height:1.75;margin-top:18px}
  .gab-note{font-size:15px}
  .gab-note,.alert{font-size:13.5px}
  .license{font-size:12.5px}
  .btn{font-size:17px;padding:15px}
  .mesa{max-width:1040px;gap:12px}
  .sheet{max-width:560px}
  .blind{padding:11px 15px}
  .blind .seal{width:64px;height:64px}
  .blind .goal .n{font-size:23px}
  .statline b{font-size:18px}
  .chips,.mult{font-size:26px;padding:9px 0}
  .fx{font-size:22px}
  .say{font-size:15px;padding:12px 14px}
  .felt{padding:10px}
  .note{font-size:11.5px;max-width:640px}
  .card.hcard{width:156px}
  .card.joker{width:128px}
  .card .nm{font-size:12px}
  .card .top{min-height:36px}
  .card .rr{font-size:7px;padding:1.5px 5px}
  .card .art{height:78px}
  .card.joker .art{height:62px}
  .card .desc{padding:6px 9px 8px;min-height:50px}
  .card .desc .v{font-size:17px}
  .card .desc small{font-size:10.8px}
  .hand{min-height:204px;gap:10px;padding-top:20px}
  .jokers{min-height:118px;gap:11px}
  .joker-empty{width:92px;height:124px;font-size:34px}
}
/* ===== arte rica das cartas: painel com proporção fixa + SVG preenchendo ===== */
.card .art{height:auto;aspect-ratio:130/100;overflow:hidden}
.card .art svg{width:100%;height:100%;display:block}
/* ===== TUTORIAL DE HOLOFOTE (spotlight) ===== */
#tourov{position:fixed;inset:0;z-index:200;pointer-events:auto}
#tspot{position:fixed;border-radius:12px;box-shadow:0 0 0 9999px rgba(3,6,11,.86);border:2px solid var(--gold);transition:all .22s ease;pointer-events:none}
#ttip{position:fixed;max-width:300px;width:calc(100% - 28px);background:var(--panel);border:2px solid var(--gold);border-radius:14px;padding:13px 15px;box-shadow:0 12px 34px #000b;pointer-events:auto;z-index:201}
#ttip .tt-title{font-size:15px;font-weight:800;color:var(--gold);margin-bottom:5px}
#ttip .tt-body{font-size:13.5px;line-height:1.5;color:#dde7df}
#ttip .tt-row{display:flex;justify-content:space-between;align-items:center;margin-top:11px;gap:10px}
#ttip .tt-count{font-size:12px;color:var(--mut);flex-shrink:0}
#ttip .tt-btns{display:flex;gap:8px}
#ttip button{border:2px solid var(--line);border-radius:9px;padding:7px 12px;font-size:13px;font-weight:800;cursor:pointer;color:#cdd9cf;background:var(--panel2)}
#ttip .tt-next{background:var(--green);color:#06311a;border-color:var(--green2)}
</style>
</head>

/* ===================================================================
   1. ÁUDIO (WebAudio) — count-up com pitch crescente, sons por gatilho
   =================================================================== */
let AC=null;
function ac(){ if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}} return AC; }
function tone(freq,dur,type,vol){
  const c=ac(); if(!c)return;
  try{
    const o=c.createOscillator(),g=c.createGain();
    o.type=type||'triangle'; o.frequency.value=freq;
    g.gain.value=vol||.05; o.connect(g); g.connect(c.destination);
    o.start(); g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+(dur||.12));
    o.stop(c.currentTime+(dur||.12)+.02);
  }catch(e){}
}
function blip(f){tone(f,.11,'triangle',.05);}
function thunk(){tone(120,.16,'sine',.10);tone(70,.18,'sine',.07);}
function whoosh(){const c=ac();if(!c)return;try{const o=c.createOscillator(),g=c.createGain();o.type='sawtooth';o.frequency.setValueAtTime(700,c.currentTime);o.frequency.exponentialRampToValueAtTime(120,c.currentTime+.28);g.gain.value=.05;o.connect(g);g.connect(c.destination);o.start();g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+.3);o.stop(c.currentTime+.32);}catch(e){}}
function buzz(){tone(150,.18,'square',.06);}
function fanfare(){[523,659,784,1046].forEach((f,i)=>setTimeout(()=>tone(f,.22,'triangle',.06),i*110));}
function vibrate(ms){try{navigator.vibrate&&navigator.vibrate(ms);}catch(e){}}

   2. JUICE COMPARTILHADO — pop flutuante, faísca, screen shake
   =================================================================== */
function pop(x,y,txt,col,big){
  const p=document.createElement('div');p.className='pop';p.textContent=txt;
  p.style.left=x+'px';p.style.top=y+'px';p.style.color=col||'var(--gold)';
  if(big)p.style.fontSize='30px';
  document.body.appendChild(p);setTimeout(()=>p.remove(),1100);
}
function sparks(x,y,col,n){
  for(let i=0;i<(n||7);i++){
    const s=document.createElement('div');s.className='spark';
    const sz=4+Math.random()*6;s.style.width=sz+'px';s.style.height=sz+'px';
    s.style.background=col;s.style.left=x+'px';s.style.top=y+'px';
    const a=Math.random()*Math.PI*2,d=18+Math.random()*34;
    s.style.transform='translate(-50%,-50%)';
    document.body.appendChild(s);
    s.animate([{transform:'translate(-50%,-50%) scale(1)',opacity:1},
      {transform:`translate(${Math.cos(a)*d-50}%,${Math.sin(a)*d-50}%) scale(0)`,opacity:0}],
      {duration:520+Math.random()*200,easing:'cubic-bezier(.2,.7,.3,1)'});
    setTimeout(()=>s.remove(),760);
  }
}
let shakeT;
function shake(hard){const s=$('#shake');s.classList.remove('shaking','hard');void s.offsetWidth;
  s.classList.add('shaking');if(hard)s.classList.add('hard');
  clearTimeout(shakeT);shakeT=setTimeout(()=>s.classList.remove('shaking','hard'),hard?440:320);}

/* ===================================================================
   3. MOTOR DE CANDLE  (reusa pY/yToP/candles/zone do GABFX.html antigo)
   =================================================================== */
function cssv(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}
function pY(p,b,pr){return b.y+b.h*(pr.max-p)/(pr.max-pr.min);}            // preço -> y
function yToP(y,b,pr){return pr.max-(y-b.y)/b.h*(pr.max-pr.min);}          // y -> preço (do GABFX onDrag)
function drawGrid(ctx,b,pr){
  ctx.strokeStyle='#ffffff0e';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=b.y+b.h*i/4;ctx.beginPath();ctx.moveTo(b.x,y);ctx.lineTo(b.x+b.w,y);ctx.stroke();}
}
function candles(ctx,arr,b,pr,n){
  const N=arr.length,show=(n==null?N:Math.min(n,N)),slot=b.w/N,cw=Math.min(18,slot*.56);
  for(let i=0;i<show;i++){
    const c=arr[i],cx=b.x+slot*i+slot/2,up=c.c>=c.o;
    const col=up?cssv('--green'):cssv('--red');
    // brilho na vela mais nova (a que está fechando)
    const fresh=(i===show-1);
    if(fresh){ctx.save();ctx.shadowColor=col;ctx.shadowBlur=10;}
    ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(cx,pY(c.h,b,pr));ctx.lineTo(cx,pY(c.l,b,pr));ctx.stroke();
    const yo=pY(c.o,b,pr),yc=pY(c.c,b,pr);
    ctx.fillRect(cx-cw/2,Math.min(yo,yc),cw,Math.max(2.5,Math.abs(yo-yc)));
    if(fresh)ctx.restore();
  }
}
function zone(ctx,z,b,pr){
  const yt=pY(z.top,b,pr),yb=pY(z.bottom,b,pr);
  ctx.fillStyle=z.fill;ctx.fillRect(b.x,yt,b.w,yb-yt);
  ctx.strokeStyle=z.stroke;ctx.lineWidth=z.lit?2.4:1.4;
  ctx.setLineDash([5,4]);ctx.strokeRect(b.x,yt,b.w,yb-yt);ctx.setLineDash([]);
  if(z.lit){ // ACENDE quando o preço testa a zona
    ctx.save();ctx.shadowColor=z.stroke;ctx.shadowBlur=16;
    ctx.strokeStyle=z.stroke;ctx.lineWidth=2.6;ctx.strokeRect(b.x,yt,b.w,yb-yt);ctx.restore();
  }
  if(z.label){ctx.fillStyle=z.lc||'#fff';ctx.font='bold 10.5px system-ui';
    ctx.fillText(z.label,b.x+6,yt-4<b.y+10?yt+13:yt-5);}
}
function arrow(ctx,x,y1,y2,col,txt){
  ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(x,y1);ctx.lineTo(x,y2);ctx.stroke();
  const d=y2<y1?-1:1;
  ctx.beginPath();ctx.moveTo(x,y2);ctx.lineTo(x-6,y2-d*9);ctx.lineTo(x+6,y2-d*9);ctx.closePath();ctx.fill();
  if(txt){ctx.font='bold 12px system-ui';ctx.save();ctx.shadowColor='#000';ctx.shadowBlur=4;
    ctx.fillText(txt,x+9,y2+(d<0?-3:15));ctx.restore();}
}

function cdl(x,o,c,h,l,col){ // x, open, close, high, low (em coord SVG), cor
  const top=Math.min(o,c),bot=Math.max(o,c);
  return `<line x1="${x}" y1="${h}" x2="${x}" y2="${l}" stroke="${col}" stroke-width="1.6"/>`+
         `<rect x="${x-5}" y="${top}" width="10" height="${Math.max(3,bot-top)}" rx="1" fill="${col}"/>`;
}
function art(kind){

  else if(kind==='sup')  s=`<rect x="0" y="34" width="${W}" height="10" fill="rgba(55,208,122,.22)" stroke="${G}" stroke-dasharray="3 3"/>`+cdl(34,26,40,22,42,R)+cdl(58,40,26,22,42,G)+`<path d="M74 30 l0 -10 m0 0 l-3 4 m3 -4 l3 4" stroke="${G}" stroke-width="1.6" fill="none"/>`;
  else if(kind==='res')  s=`<rect x="0" y="8" width="${W}" height="10" fill="rgba(255,107,94,.22)" stroke="${R}" stroke-dasharray="3 3"/>`+cdl(34,28,14,8,30,G)+cdl(58,14,28,8,30,R)+`<path d="M74 22 l0 10 m0 0 l-3 -4 m3 4 l3 -4" stroke="${R}" stroke-width="1.6" fill="none"/>`;
  else if(kind==='close')s=cdl(46,38,16,10,42,G)+`<line x1="20" y1="16" x2="72" y2="16" stroke="${GD}" stroke-width="1.4" stroke-dasharray="3 2"/><text x="46" y="11" font-size="7.5" text-anchor="middle" fill="${GD}">fechou ✓</text>`;
  else if(kind==='road') s=`<rect x="0" y="10" width="${W}" height="8" fill="rgba(255,107,94,.2)" stroke="${R}" stroke-dasharray="3 3"/>`+cdl(30,42,30,26,46,G)+cdl(50,30,18,12,34,G)+`<text x="74" y="16" font-size="9" fill="${GD}">🎯</text>`;
  else if(kind==='mtf')  s=`<rect x="5" y="8" width="36" height="34" rx="3" fill="none" stroke="${G}" opacity=".7"/><rect x="51" y="8" width="36" height="34" rx="3" fill="none" stroke="${B}" opacity=".7"/>`+cdl(20,32,20,14,40,G)+cdl(68,32,20,14,40,G);
  else                   s=`<text x="46" y="32" font-size="20" text-anchor="middle" fill="${GD}">?</text>`;
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="100%" preserveAspectRatio="none">`+
         `<rect width="${W}" height="${H}" fill="#0b1320"/>`+s+`</svg>`;
}

/* transforma termos conhecidos em <span class="kw"> clicável */
function linkify(html){
  // só os 1ª ocorrência de cada termo pra não poluir
  const used=new Set();
  const terms=[['resistência','resistencia'],['resistencia','resistencia'],['suporte','suporte'],['roadblock','roadblock'],
    ['candle-close','fechamento'],['fechamento','fechamento'],['pavio','pavio'],['corpo','corpo'],
    ['multi-timeframe','mtf'],['vender','vender'],['comprar','comprar'],['zona','zona'],['pip','pip'],['snr','snr']];
  for(const [word,key] of terms){
    if(used.has(key))continue;
    const re=new RegExp('(?<![\\w>])('+word.replace(/[-]/g,'\\-')+')(?![\\w<])','i');
    if(re.test(html)){html=html.replace(re,(m,p1)=>`<span class="kw" data-g="${key}">${p1}</span>`);used.add(key);}
  }
  return html;
}

function shortDesc(c){

function tilt(d){
  const sh=d.querySelector('.shine');
  d.addEventListener('pointermove',e=>{
    if(d.classList.contains('flying'))return;
    const r=d.getBoundingClientRect();
    const px=(e.clientX-r.left)/r.width-.5,py=(e.clientY-r.top)/r.height-.5;
    const baseY=d.classList.contains('sel')?-15:0;
    d.style.transform=`perspective(620px) translateY(${baseY}px) rotateY(${px*22}deg) rotateX(${-py*22}deg) scale(${d.classList.contains('sel')?1.05:1.04})`;
    d.classList.add('lifted');
    sh.style.setProperty('--mx',(px*120+50)+'%');sh.style.setProperty('--my',(py*120+50)+'%');
  });
  d.addEventListener('pointerleave',()=>{d.classList.remove('lifted');if(!d.classList.contains('flying'))d.style.transform='';});
}
/* clique curto = selecionar (mão) ; segurar (>=380ms) ou ⓘ = painel "eu não sei nada" */
function bindPress(d,c,kind){
  let timer=null,longed=false,sx=0,sy=0,moved=false;
  const start=e=>{longed=false;moved=false;sx=e.clientX;sy=e.clientY;
    timer=setTimeout(()=>{longed=true;cardDetail(c);vibrate(12);},380);};
  const move=e=>{if(Math.abs(e.clientX-sx)>10||Math.abs(e.clientY-sy)>10){moved=true;clearTimeout(timer);}};
  const end=e=>{clearTimeout(timer);
    if(longed)return;
    if(d.dataset.infohit){d.dataset.infohit='';return;}
    if(kind==='hand'&&!moved&&d._toggle)d._toggle();
    else if(kind!=='hand'&&!moved)cardDetail(c); // coringa: toque abre painel
  };
  d.addEventListener('pointerdown',start);
  d.addEventListener('pointermove',move);
  d.addEventListener('pointerup',end);
  d.addEventListener('pointercancel',()=>clearTimeout(timer));
  // ⓘ sempre abre painel
  const dot=d.querySelector('.infodot');
  if(dot)dot.addEventListener('pointerdown',e=>{e.stopPropagation();d.dataset.infohit='1';clearTimeout(timer);cardDetail(c);});
}

/* ===================================================================
   11. SCORING ENGINE (item 2) — Score = CHIPS × MULT, 4 fases encenadas.
   Fiel ao Balatro: base da mão -> cartas pontuadas esq->dir -> seguradas
   -> coringas esq->dir. +Mult e ×Mult NÃO comutam (×Mult é aplicado DEPOIS).
   CHIPS = qualidade da zona. MULT = agressividade (risco/confluência).
   No Ato 0 o ×Mult vem dos selos-coringa; o +Mult ainda não tem carta
   (entra no Ato 1) — mas o pipeline já o suporta e o aplica antes do ×.
   =================================================================== */
function buildScorePlan(setup){
  // setup = {cards:[deckObj...], idxs:[handIndex...], jokers:[sealObj...], dir, hasZone, zoneCards}
  const plan=[]; // lista de passos encenados
  // FASE 1 — base da mão (tipo de setup): no Ato 0, base = +0/×1 mas nomeia a mão
  plan.push({phase:1,kind:'base',label:'Base do setup',chips:0,addMult:0,xMult:1,
    note:setupName(setup)});
  // FASE 2 — cartas pontuadas, esquerda -> direita
  // i = índice REAL na mão (não a posição no setup) p/ casar o DOM mesmo com cartas repetidas.
  setup.cards.forEach((c,pos)=>{
    let chips=c.chips||0, add=c.addMult||0, x=1;
    // selo Corpo (body) aplicado às cartas de zona: +8 chips [GAB: marcar só o corpo]
    if(setup.hasBody && (c.tipo==='zona')) chips+=8;
    plan.push({phase:2,kind:'card',ref:c,idx:setup.idxs?setup.idxs[pos]:-1,
      chips,addMult:add,xMult:x,trap:!!c.trap});
  });
  // FASE 3 — cartas "seguradas" (held): no Ato 0 não há mão segurada relevante (placeholder p/ Ato 7+)
  // FASE 4 — coringas, esquerda -> direita (×Mult — NÃO comutativo, vem por último)
  setup.jokers.forEach(j=>{
    plan.push({phase:4,kind:'joker',ref:j,chips:0,addMult:0,xMult:j.mult});
  });
  return plan;
}
function setupName(s){
  if(!s.hasZone)return 'Sem zona (inválido)';
  if(s.cards.some(c=>c.trap))return 'Contém pavio (armadilha)';
  const conf=s.cards.some(c=>c.tipo==='confirma'&&c.dir===s.dir);
  if(conf)return 'Zona + Confirmação';
  return 'Zona solta';
}

  let blind={alvo:300,maos:4,desc:3},        // [LICENÇA] Ato 0, Ante 1 = 300 pips (escala do doc)
      pips=0,sel=new Set(),busy=false,firstHand=true,priceTested=false,zoneMarked=false;
  let jokers=['close','roadblock'];          // 2 selos-coringa do Ato 0

  /* ---------- desenho do gráfico (zona acende ao ser testada) ---------- */
  function drawTrade(arr,n){

    cards.forEach(c=>{

    let mult=1;jokers.forEach(id=>mult*=SEALS[id].mult);
    mult=Math.round(mult*10)/10;
    return {chips,mult,dir,hasZone,hasBody,hasTrap,cards,idxs};

  /* ---------- canvas probe: leitura do preço (reusa yToP) ---------- */
  /* ---------- RÉGUA DE PIPS: arraste no gráfico = mede a distância em pips (igual MetaTrader) ---------- */
  function bindCanvasProbe(){
    const cv=$('#bd');if(!cv)return;let probing=false,sy=0,hinted=false;
    const toLocal=e=>{const r=cv.getBoundingClientRect();return {x:(e.clientX-r.left)*cv.width/r.width,y:(e.clientY-r.top)*cv.height/r.height};};
    const toPips=d=>Math.round(Math.abs(d)*10);  // ouro: ~10 pips por R$1,00 [LICENÇA: escala didática]
    const hLine=(ctx,yy,c)=>{ctx.strokeStyle=c;ctx.setLineDash([4,3]);ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(B.x,yy);ctx.lineTo(B.x+B.w,yy);ctx.stroke();ctx.setLineDash([]);};
    const draw=e=>{const {x,y}=toLocal(e);const price=yToP(y,B,PR);
      drawTrade();const ctx=cv.getContext('2d');
      if(Math.abs(y-sy)<7){ // toque/parado: só lê o preço naquele nível
        hLine(ctx,y,'#f4c95d');
        ctx.fillStyle='#f4c95d';ctx.font='bold 11px system-ui';
        ctx.fillText('R$ '+price.toFixed(1),Math.min(x+6,B.x+B.w-60),Math.max(B.y+12,y-4));
        return;
      }
      // RÉGUA: mede do ponto onde você apertou (âncora) até o atual, em PIPS
      const p0=yToP(sy,B,PR),pips=toPips(price-p0),up=y<sy,col=up?'#37d07a':'#fe5f55';
      hLine(ctx,sy,'#f4c95d');                          // âncora
      hLine(ctx,y,col);                                 // ponto atual
      ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(x,sy);ctx.lineTo(x,y);ctx.stroke(); // conector
      ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-3,y+(up?5:-5));ctx.moveTo(x,y);ctx.lineTo(x+3,y+(up?5:-5));ctx.stroke(); // seta
      const lx=Math.min(x+8,B.x+B.w-72),ly=(sy+y)/2;     // rótulo
      ctx.fillStyle='rgba(11,19,32,.85)';ctx.fillRect(lx-4,ly-13,70,28);
      ctx.strokeStyle=col;ctx.lineWidth=1;ctx.strokeRect(lx-4,ly-13,70,28);
      ctx.fillStyle=col;ctx.font='bold 13px system-ui';ctx.fillText(pips+' pips',lx,ly+1);
      ctx.fillStyle='#f4c95d';ctx.font='10px system-ui';ctx.fillText('Δ R$ '+Math.abs(price-p0).toFixed(1),lx,ly+12);
      if(!hinted){hinted=true;conceptToast('📏','Régua de pips',`Você está medindo a distância em <b>pips</b> entre dois pontos do preço — igual à ferramenta de medição do <b>MetaTrader</b>. É assim que se mede o alvo (e o risco) de um trade.`);}
    };
    cv.addEventListener('pointerdown',e=>{if(busy)return;sy=toLocal(e).y;probing=true;draw(e);});
    cv.addEventListener('pointermove',e=>{if(probing&&!busy)draw(e);});
    function tryMark(e){const price=yToP(toLocal(e).y,B,PR);
      if(price>=137.9&&price<=141.6){ // CORPO (faixa verde) = certo
        zoneMarked=true;drawTrade();blip(720);vibrate(12);sparks(B.x+B.w*0.5,pY((SUPZ.top+SUPZ.bottom)/2,B,PR),'#37d07a',10);
        say('✅ <b>Marcou no CORPO!</b> Zona confirmada (faixa verde). Agora monte <b>Suporte + Vela de Alta</b> e <b>OPERE</b>.');
        conceptToast('✅','Zona marcada certa',`Você leu o gráfico e marcou o suporte pelo <b>corpo</b> — não pelo pavio. É assim que o GAB faz. O trade liberou.`);
      } else if(price>=136&&price<137.9){ // PAVIO = errado (ensina)
        buzz();shake();drawTrade();
        say('❌ Esse é o <b>PAVIO</b> (o espeto fino, ~137). A zona é o <b>CORPO</b> — a faixa <b>VERDE</b> (~139). Arraste de novo na faixa verde.');
      } else { drawTrade();
        say('🎯 Marque na <b>faixa VERDE</b> (onde os corpos pararam de cair). Arraste a linha até ela.');
      }
    }
    cv.addEventListener('pointerup',e=>{probing=false;if(busy)return;if(!zoneMarked)tryMark(e);else drawTrade();});
    cv.addEventListener('pointercancel',()=>{probing=false;if(!busy)drawTrade();});
  }

  /* ---------- descartar (com swipe + whoosh) ---------- */
  function descartar(){
    if(busy||blind.desc<=0)return;
    if(!sel.size){buzz();say('Selecione as cartas que quer descartar.');return;}
    busy=true;blind.desc--;whoosh();vibrate(14);
    const els=$$('.hand .card.sel');
    els.forEach((el,k)=>{
      el.classList.add('flying');
      el.animate([{transform:'translateY(-15px)',opacity:1},
        {transform:`translate(${(k%2?1:-1)*260}px,40px) rotate(${(k%2?1:-1)*30}deg)`,opacity:0}],
        {duration:420,easing:'cubic-bezier(.5,0,.8,.4)',fill:'forwards'});
    });
    setTimeout(()=>{
      [...sel].sort((a,b)=>b-a).forEach(i=>hand.splice(i,1));
      sel.clear();refill();render();busy=false;
    },440);
  }
  function refill(){
    const pool=['sup','bull','bear','res','body','wick'];
    while(hand.length<6){hand.push(pool[Math.floor(Math.random()*pool.length)]);}
    // [GAB] garante jogada vencedora: ao menos 1 zona + 1 confirmação na MESMA direção
    // (sup→bull / res→bear). 'wick' (armadilha) e 'body' (selo) seguem aparecendo — são
    // pedagógicos — mas nunca travam a mão.
    const temZona=d=>hand.some(id=>DECK[id].tipo==='zona'&&DECK[id].dir===d);
    const temConf=d=>hand.some(id=>DECK[id].tipo==='confirma'&&DECK[id].dir===d);
    if((temZona('buy')&&temConf('buy'))||(temZona('sell')&&temConf('sell')))return; // já jogável
    // reaproveita o que a mão já esboça; mão neutra (só wick/body) → compra (o cenário é um suporte)
    const buyComp=temZona('buy')||temConf('buy'),sellComp=temZona('sell')||temConf('sell');
    const dir=(buyComp||!sellComp)?'buy':'sell';
    const zCard=dir==='buy'?'sup':'res',cCard=dir==='buy'?'bull':'bear';
    const keep=[];
    // qual carta sacrificar p/ abrir slot: pavio → selo → direção oposta → resto (nunca o par certo)
    const slotLivre=()=>{
      const rank=id=>{const c=DECK[id];return c.trap?0:c.tipo==='selo'?1:(c.dir&&c.dir!==dir)?2:3;};
      let best=0,bestR=9;
      for(let i=0;i<hand.length;i++){if(keep.includes(i))continue;const r=rank(hand[i]);if(r<bestR){bestR=r;best=i;}}
      return best;
    };
    if(!temZona(dir)){const s=slotLivre();hand[s]=zCard;keep.push(s);}
    if(!temConf(dir)){const s=slotLivre();hand[s]=cCard;keep.push(s);}
  }

  /* ---------- OPERAR: validações que ENSINAM (nunca cobra o não-ensinado) ---------- */
  function operar(){
    if(busy)return;const k=calc();
    if(!zoneMarked){buzz();shake();say('🎯 Primeiro <b>marque o suporte</b>: arraste no gráfico até a faixa <b>VERDE</b> (o corpo, não o pavio). Aí o trade libera.');conceptToast('🎯','Leia o gráfico primeiro',`Antes de operar, marque onde está o suporte — no <b>corpo</b>, na faixa verde. É a leitura que o GAB faz toda vez.`);return;}
    if(!sel.size){buzz();say('Selecione cartas pra montar o setup primeiro.');return;}
    if(k.hasTrap){ // armadilha do pavio: explica o erro, não pune escondido
      buzz();shake();
      say('❌ Você colocou o <b>Pavio</b> no setup. O pavio marca a zona pela ponta errada — a entrada fica falsa. Tire o pavio: marque pelo <b>Corpo</b>.');
      conceptToast('⚠','Por que falhou',`O <b>pavio</b> não marca zona ("the wick is useless"). Descarte-o e use <b>O Corpo</b>. Isso não gasta uma mão — só remova a carta.`);
      const trapEl=$$('.hand .card.sel').find(el=>DECK[hand[+el.dataset.i]].trap);
      if(trapEl){trapEl.classList.add('trap-revealed');sparks(...centerOf(trapEl),'#fe5f55',8);}
      return;
    }
    if(!k.hasZone){
      buzz();shake();
      say('❌ Sem <b>zona</b> não há trade. O GAB sempre entra num <b>suporte</b> ou <b>resistência</b>. Toque numa carta de zona.');
      conceptToast('🧭','Precisa de zona',`A força do trade vem da <b>zona</b>, não da vela solta. Adicione um <b>Suporte</b> (compra) ou <b>Resistência</b> (venda).`);
      return;
    }
    // operação válida -> encena
    busy=true;firstHand=false;blind.maos--;
    $('#op').disabled=true;$('#dc').disabled=true;
    if($('#maosb'))$('#maosb').textContent=blind.maos;
    const buy=k.dir==='buy';
    const cont=buy?CONT_BUY:CONT_SELL,full=SETUP.concat(cont);
    animateTrade(full,buy,k);
  }
  function centerOf(el){const r=el.getBoundingClientRect();return [r.left+r.width/2,r.top+r.height/2];}

  /* ---------- 1) o trade roda candle a candle no gráfico ---------- */
  function animateTrade(full,buy,k){
    let n=SETUP.length;
    const cv=$('#bd'),ctx=cv.getContext('2d');
    say(buy?'Comprando no suporte… vamos ver se o piso segura.':'Vendendo no suporte… (atenção: no piso se COMPRA).');
    const tm=setInterval(()=>{
      n++;drawTrade(full,n);blip(300+n*12);
      if(n>=full.length){
        clearInterval(tm);
        const slot=B.w/full.length,ax=B.x+slot*(SETUP.length-0.5);
        arrow(ctx,ax,pY(SUPZ.bottom,B,PR),pY(buy?ROAD.bottom:SUPZ.bottom-10,B,PR),buy?'#37d07a':'#fe5f55',buy?'COMPRA':'VENDA');
        setTimeout(()=>flyCardsToCenter(k,buy),360);

  /* ---------- 2) cartas VOAM pro centro (bezier + overshoot) ---------- */
  function flyCardsToCenter(k,buy){
    const els=$$('.hand .card.sel');
    const cx=window.innerWidth/2, cy=$('#bd').getBoundingClientRect().bottom+10;
    els.forEach((el,i)=>{
      const r=el.getBoundingClientRect();
      const dx=cx-(r.left+r.width/2)+(i-(els.length-1)/2)*70;
      const dy=cy-(r.top+r.height/2);
      el.classList.add('flying');
      el.style.zIndex=50;
      el.animate([
        {transform:'translate(0,0) scale(1.03)'},
        {transform:`translate(${dx*0.6}px,${dy*0.6}px) scale(1.12) rotate(${(i-1)*4}deg)`,offset:.6},
        {transform:`translate(${dx}px,${dy}px) scale(1.18) rotate(0deg)`,offset:.82}, // overshoot
        {transform:`translate(${dx}px,${dy*0.97}px) scale(1.1)`} // settle
      ],{duration:560,easing:'cubic-bezier(.34,1.56,.5,1)',fill:'forwards'});
      blip(500+i*60);
    });
    whoosh();
    setTimeout(()=>scorePipeline(k,buy,els),600);
  }

  /* ---------- 3) PIPELINE DE 4 FASES encenado (item 2) ---------- */
  function scorePipeline(k,buy,cardEls){
    const setup={cards:k.cards,idxs:k.idxs,jokers:jokerObjs(),dir:k.dir,hasZone:k.hasZone,hasBody:k.hasBody};
    const plan=buildScorePlan(setup);
    // NÃO-COMUTATIVIDADE (fiel ao Balatro): mult acumula PRIMEIRO os +Mult
    // (fases 1-3, encenadas), e só DEPOIS os coringas aplicam ×Mult (fase 4).
    // Pôr o ×Mult por último maximiza — furar a ordem desperdiça. No Ato 0 não
    // há carta de +Mult ainda (entra no Ato 1), mas o motor já soma de verdade.
    let chips=0,mult=1;
    let step=0;
    setNum($('#chips'),0);setNum($('#mult'),1);
    say('Pontuando o setup, carta a carta — igual o trade rodando no real.');

    function runStep(){
      if(step>=plan.length){ return finish(chips,Math.round(mult*10)/10,buy,k); }
      const s=plan[step];step++;
      if(s.kind==='base'){
        // FASE 1 — nomeia o setup (mão)
        say('Setup: <b>'+s.note+'</b>.');
        setTimeout(runStep,360);
        return;
      }
      if(s.kind==='card'){
        // FASE 2 — cada carta de pontuação PULA e solta o número (azul = +chips)
        // casa o DOM pelo ÍNDICE da mão (robusto a cartas repetidas).
        const el=cardEls.find(e=>(+e.dataset.i)===s.idx)
              || cardEls.find(e=>DECK[hand[+e.dataset.i]]===s.ref);
        if(el)bumpCard(el);
        chips+=s.chips;
        setNum($('#chips'),chips);
        // +Mult (vermelho) entra ANTES do ×Mult — encena a soma quando houver
        if(s.addMult){mult+=s.addMult;setNum($('#mult'),Math.round(mult*10)/10);
          if(el){const [mx,my]=centerOf(el);pop(mx+14,my-22,'+'+s.addMult+' mult','#fe5f55');}}
        if(el){const [x,y]=centerOf(el);if(s.chips){pop(x-14,y-22,'+'+s.chips,'#3ea0e0');sparks(x,y-10,'#3ea0e0',5);}}
        // pitch crescente (kaw kaw): som sobe com os chips
        blip(420+Math.min(900,chips*3));thunk();shake();vibrate(8);
        setTimeout(runStep,420);
        return;
      }
      if(s.kind==='joker'){
        // FASE 4 — coringas, ×Mult (dourado), aplicado por ÚLTIMO (não comuta)
        const jkEls=$$('.jokers .card');
        const idx=jokerObjs().indexOf(s.ref);
        const el=jkEls[idx];
        if(el)bumpCard(el,true);
        // ×Mult em dourado (os +Mult já foram somados acima):
        mult=Math.round(mult*s.xMult*10)/10;
        setNum($('#mult'),mult);
        if(el){const [x,y]=centerOf(el);pop(x-12,y-20,'×'+s.xMult,'#f4c95d');sparks(x,y-8,'#f4c95d',6);}
        blip(720+idx*90);shake(true);vibrate(10);
        // feedback que ENSINA (item: avisa quando usou o coringa certo)
        if(s.ref.buff==='close')conceptToast('⏳','Candle-Close ✓',`Você operou no <b>fechamento</b> da vela: ×${s.xMult}. Paciência paga. [GAB]`);
        if(s.ref.buff==='tp')conceptToast('🎯','Roadblock ✓',`Você mirou o <b>alvo</b> certo (a zona oposta): ×${s.xMult}. [GAB]`);
        setTimeout(runStep,460);
        return;
      }
      setTimeout(runStep,200);
    }
    setTimeout(runStep,260);
  }
  function bumpCard(el,joker){
    el.animate(joker
      ?[{transform:el.style.transform||'none'},{transform:'scale(1.22) rotate(-4deg)'},{transform:el.style.transform||'none'}]
      :[{},{transform:(el.style.transform||'translateY(0)')+' scale(1.16)'},{}],
      {duration:300,easing:'cubic-bezier(.2,1.5,.4,1)'});
  }

  /* ---------- 4) resultado: count-up dos pips com pitch crescente ---------- */
  function finish(chips,mult,buy,k){
    const raw=Math.round(chips*mult);
    // direção certa? suporte = COMPRA. Vender no suporte = operar contra a zona (perde) [GAB]
    const correct=buy;
    const gain=correct?raw:-Math.round(raw*0.5);
    const target=Math.max(0,pips+gain);
    let n=pips;const dir=gain>=0?1:-1,stepN=Math.max(1,Math.round(Math.abs(gain)/22));
    say(correct?'Subindo… o piso segurou!':'O preço subiu contra a venda…');
    const tt=setInterval(()=>{
      n+=dir*stepN;
      if((dir>0&&n>=target)||(dir<0&&n<=target))n=target;
      pips=Math.max(0,n);
      if($('#pipsb'))$('#pipsb').textContent=pips;
      if($('#goalp'))$('#goalp').textContent=pips+' / '+blind.alvo;
      // pitch crescente = o "kaw kaw"
      blip(300+(pips/blind.alvo)*620);
      if(n===target){
        clearInterval(tt);
        if(gain>=0){fanfare();sparks(window.innerWidth/2,window.innerHeight*0.4,'#f4c95d',16);}
        else{buzz();shake(true);}
        S.xp+=correct?8:2;save();
        // restaura cartas
        $$('.hand .card').forEach(el=>{el.classList.remove('flying','sel','trap-revealed');el.style.zIndex='';el.style.transform='';});
        sel.clear();
        setTimeout(()=>roundResult(correct,chips,mult,gain,k),520);
      }
    },46);
  }

  /* ---------- tela de mão (resultado parcial / fim de run) ---------- */
  function roundResult(correct,chips,mult,gain,k){
    const reachedGoal=pips>=blind.alvo;
    const outOfHands=blind.maos<=0;
    busy=false;
    if(reachedGoal){return endRun(true);}
    if(outOfHands){return endRun(false);}
    // continua a run: feedback + próxima mão
    const why=correct
      ? `<div class="why"><b>✅ Por que deu certo:</b> você comprou no <b>suporte</b> (o piso, onde estão os compradores) e confirmou com a vela. ${chips} chips × ${mult} = <b>+${gain} pips</b>. Zona forte + direção certa = pips de verdade. [GAB]</div>`
      : `<div class="why bad"><b>❌ Por que deu errado:</b> você <b>vendeu num suporte</b>. No piso se <b>COMPRA</b> (os compradores empurram pra cima). O preço subiu e bateu o stop: ${gain} pips. Não é punição — é a aula: respeite a direção da zona.</div>`;
    showSheet(correct?'🎉 Boa jogada':'📉 Trade no vermelho',
      `<div class="result"><div class="pipbig">${pips} <span style="font-size:16px;color:var(--mut)">/ ${blind.alvo} pips</span></div>${why}
       <button class="btn go" id="next">▶ Próxima mão (${blind.maos} restantes)</button></div>`,{noX:true,sticky:true});
    $('#next').onclick=()=>{closeSheet();refill();render();};
  }

  /* ---------- fim da run (Hades: death is progress) ---------- */
  function endRun(win){
    S.runs=(S.runs||0)+1;
    if(win&&!S.bossWon){S.bossWon=true;S.xp+=20;}
    save();
    if(win){
      const unlockHTML=`<div class="unlock"><span style="font-size:20px">🃏</span><div>Próximo: <b>Ato 1 — Flip de Polaridade</b>. Entram <b>RBS</b>, <b>SBR</b>, <b>Breakout</b> e o <b>Pullback</b>. As cartas ficam mais fortes e os coringas começam a <b>somar +Mult</b> antes do ×Mult.</div></div>`;
      showSheet('🏆 Chefe derrotado!',
        `<div class="result"><div class="result-icon">🏆</div><h2 style="color:var(--gold)">O Gráfico Limpo caiu</h2>
         <div class="pipbig">${pips} <span style="font-size:16px;color:var(--mut)">/ ${blind.alvo} pips</span></div>
         <p>Você dominou a <b>leitura crua</b>: vela, compra×venda, pip, a regra dos 2 candles, marcar só o <b>corpo</b> e esperar o <b>fechamento</b>. Esse é o coração do método do GAB.</p>
         ${unlockHTML}
         <div class="alert"><div>⚠️</div><div>Lembre: aqui é simulação. No real o GAB arrisca ~10% por setup e usa alavancagem — agressivo. A gestão de risco fiel vem nos Atos 7+.</div></div>
         <button class="btn primary" id="again">▶ Jogar a run de novo</button>
         <button class="btn ghost" id="menu">Voltar ao menu</button></div>`,{noX:true,sticky:true});
    }else{
      showSheet('📊 Run encerrada',
        `<div class="result"><div class="result-icon">📉</div><h2>A operação fechou</h2>
         <div class="pipbig">${pips} <span style="font-size:16px;color:var(--mut)">/ ${blind.alvo} pips</span></div>
         <p>Perder uma run <b>não é o fim</b> — é a aula (death is progress). No real, gestão de risco é o que te mantém vivo.</p>
         <div class="why"><b>Dica do mestre:</b> monte <b>Suporte + Vela de Alta</b> (mesma direção, COMPRA), junte <b>O Corpo</b> pra valorizar a zona e <b>evite o Pavio</b>. Vendeu no suporte? Aí perde — no piso se compra.</div>
         <button class="btn primary" id="again">▶ Tentar a run de novo</button>
         <button class="btn ghost" id="menu">Voltar ao menu</button></div>`,{noX:true,sticky:true});
    }
    const ag=$('#again');if(ag)ag.onclick=()=>{closeSheet();runAto0();};
    const mn=$('#menu');if(mn)mn.onclick=()=>{closeSheet();menu();};
  }

  render();
  $('#screen').scrollTop=0;
  if(!S.tourSeen) setTimeout(()=>startMesaTour(true),480);
}

function startMesaTour(auto){
  if(!document.querySelector('#bd')||document.getElementById('tourov'))return;
  let idx=0;
  const ov=document.createElement('div');ov.id='tourov';
  ov.innerHTML='<div id="tspot"></div><div id="ttip"><div class="tt-title"></div><div class="tt-body"></div><div class="tt-row"><span class="tt-count"></span><div class="tt-btns"><button class="tt-skip">Pular</button><button class="tt-next"></button></div></div></div>';
  document.body.appendChild(ov);
  const spot=ov.querySelector('#tspot'),tip=ov.querySelector('#ttip');
  function paint(){
    const st=MESA_STEPS[idx],el=document.querySelector(st.sel);
    if(!el){idx++;if(idx>=MESA_STEPS.length)return end();return paint();}
    el.scrollIntoView({block:'center'});
    requestAnimationFrame(()=>{
      const r=el.getBoundingClientRect(),pad=6;
      spot.style.left=(r.left-pad)+'px';spot.style.top=(r.top-pad)+'px';
      spot.style.width=(r.width+pad*2)+'px';spot.style.height=(r.height+pad*2)+'px';
      tip.querySelector('.tt-title').innerHTML=st.title;
      tip.querySelector('.tt-body').innerHTML=st.body;
      tip.querySelector('.tt-count').textContent=(idx+1)+' / '+MESA_STEPS.length;
      tip.querySelector('.tt-next').textContent=idx<MESA_STEPS.length-1?'Próximo ›':'Começar ▶';
      const vw=window.innerWidth,vh=window.innerHeight,tw=tip.offsetWidth,th=tip.offsetHeight;
      let top=r.bottom+12;if(top+th>vh-10)top=Math.max(10,r.top-th-12);
      let left=Math.min(Math.max(10,r.left),vw-tw-10);
      tip.style.top=top+'px';tip.style.left=left+'px';
    });
  }
  function end(){ov.remove();if(auto){S.tourSeen=true;save();}}
  ov.querySelector('.tt-next').onclick=()=>{blip(560);idx++;if(idx>=MESA_STEPS.length)end();else paint();};
  ov.querySelector('.tt-skip').onclick=end;
  paint();
}
